<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>ICRCV - Sistema de Votación</title>
    <link rel="icon" type="image/png" href="Logos/logoICRCV.jpg">
    <div class="logo">
        <img src="../Logos/logoICRCV.jpg">
    </div>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            flex-direction: column;
        }

        .logo {
            text-align: center;
        }

        .logo img {
            width: 260px;
        }

        h1 {
            color: #1b5e20;
        }

        .loader {
            margin-top: 20px;
            border: 6px solid #eee;
            border-top: 6px solid #2e7d32;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg)
            }

            100% {
                transform: rotate(360deg)
            }
        }
    </style>

    <script>
        setTimeout(() => {
            window.location.href = "fronts/candidatos.html"
        }, 2000)
    </script>

</head>

<body>

    <h1>Bienvenido al sistema de votación</h1>
    <p>ICRCV - Elección de Diáconos</p>

    <div class="loader"></div>

</body>

</html>
